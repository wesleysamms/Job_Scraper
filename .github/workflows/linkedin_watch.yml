name: LinkedIn MLE/DS Watcher

on:
  # Scheduling is driven externally by cron-job.org (hourly at :17 PT, 8am-8pm).
  # GH Actions cron was unreliable — losing 50%+ of scheduled fires under load.
  # Watchdog workflow (linkedin_watch_backup.yml at :33) is the in-GH backup
  # in case cron-job.org has an outage.
  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: LinkedIn scrape
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape LinkedIn (last 1h)
        run: python scrape_jobs.py --linkedin-only

      - name: Record workflow run
        run: |
          python - <<'EOF'
          import json
          import os
          from datetime import datetime, timezone

          with open("linkedin_jobs.json", encoding="utf-8") as f:
              data = json.load(f)

          entry = {
              "workflow": "linkedin",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "job_count": int(data.get("total", 0)),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }

          with open("workflow_runs.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(entry, sort_keys=True) + "\n")
          EOF

      - name: Commit results to repo
        run: |
          git config user.name  "ernestod1998"
          git config user.email "61074783+ernestod1998@users.noreply.github.com"
          git add linkedin_jobs.json linkedin_jobs.md linkedin_jobs.html workflow_runs.jsonl all_jobs.json
          git diff --cached --quiet || git commit -m "chore: update linkedin listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push
