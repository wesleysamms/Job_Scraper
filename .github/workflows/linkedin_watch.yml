name: LinkedIn MLE/DS Watcher

on:
  schedule:
    # Every 3 hours, 8 AM–8 PM PST (UTC-8): 16, 19, 22, 01, 04 UTC
    - cron: "0 1,4,16,19,22 * * *"

  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: LinkedIn scrape + email
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape LinkedIn (last 1h)
        run: python scrape_jobs.py --linkedin-only

      - name: Record workflow run
        run: |
          python - <<'EOF'
          import json
          import os
          from datetime import datetime, timezone

          with open("linkedin_jobs.json", encoding="utf-8") as f:
              data = json.load(f)

          entry = {
              "workflow": "linkedin",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "job_count": int(data.get("total", 0)),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }

          with open("workflow_runs.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(entry, sort_keys=True) + "\n")
          EOF

      - name: Commit results to repo
        run: |
          git config user.name  "ernestod1998"
          git config user.email "61074783+ernestod1998@users.noreply.github.com"
          git add linkedin_jobs.json linkedin_jobs.md linkedin_jobs.html workflow_runs.jsonl
          git diff --cached --quiet || git commit -m "chore: update linkedin listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push

      - name: Send email with results
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, json
          from datetime import datetime
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from zoneinfo import ZoneInfo

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          with open("linkedin_jobs.json") as f:
              data = json.load(f)
          with open("linkedin_jobs.md") as f:
              body_md = f.read()
          with open("linkedin_jobs.html") as f:
              body_html = f.read()

          total = data["total"]
          scraped_at = data["scraped_at"]

          now_pt = datetime.now(ZoneInfo("America/Los_Angeles"))
          hour = now_pt.hour % 12 or 12
          suffix = "AM" if now_pt.hour < 12 else "PM"
          slot = f"{hour}{suffix} PT"

          subject = f"🔥 LinkedIn {slot} — {total} role(s) in last hour [{scraped_at[:10]}]"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = user
          msg.attach(MIMEText(body_md, "plain", "utf-8"))
          msg.attach(MIMEText(body_html, "html", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(user, password)
              smtp.sendmail(user, user, msg.as_string())

          print(f"✅ Email sent to {user}")
          EOF
