name: USAJOBS Env/Tox Watcher

on:
  # Daily — federal postings change at day resolution. Runs at 15:37 UTC
  # (~8am PT), offset from the other watchers, plus on demand.
  schedule:
    - cron: "37 15 * * *"
  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: USAJOBS scrape
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scrape USAJOBS (federal env/tox jobs)
        run: python scrape_jobs.py --usajobs-only
        env:
          PUSHOVER_TOKEN: ${{ secrets.PUSHOVER_TOKEN }}
          PUSHOVER_USER: ${{ secrets.PUSHOVER_USER }}
          NOTIFY_MIN_FIT: ${{ vars.NOTIFY_MIN_FIT }}

      - name: Commit results to repo
        run: |
          git config user.name  "ScottCoffin"
          git config user.email "ScottCoffin@users.noreply.github.com"
          git add usajobs_jobs.json usajobs_jobs.md usajobs_jobs.html all_jobs.json notified.json
          git diff --cached --quiet || git commit -m "chore: update usajobs listings [$(date -u '+%Y-%m-%d %H:%MZ')]"
          git pull --rebase origin main
          git push
