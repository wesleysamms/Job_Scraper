name: Biotech MLE Job Scraper

on:
  schedule:
    # 03:00 UTC = 8 PM PDT (UTC-7). In PST (UTC-8) this fires at 7 PM PT — close enough.
    - cron: "0 3 * * *"

  workflow_dispatch:

concurrency:
  group: job-scraper-commit-push
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape MLE Job Listings
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run scraper (biotech LinkedIn, last 24h, allowlist-filtered)
        run: python scrape_jobs.py --biotech-only

      - name: Record workflow run
        run: |
          python - <<'EOF'
          import json
          import os
          from datetime import datetime, timezone

          with open("jobs.json", encoding="utf-8") as f:
              data = json.load(f)

          entry = {
              "workflow": "biotech",
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "job_count": int(data.get("total", 0)),
              "run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
          }

          with open("workflow_runs.jsonl", "a", encoding="utf-8") as f:
              f.write(json.dumps(entry, sort_keys=True) + "\n")
          EOF

      - name: Commit results to repo
        run: |
          git config user.name  "ernestod1998"
          git config user.email "61074783+ernestod1998@users.noreply.github.com"
          git add jobs.json jobs.md jobs.html workflow_runs.jsonl
          git diff --cached --quiet || git commit -m "chore: update job listings [$(date -u '+%Y-%m-%d')]"
          git pull --rebase origin main
          git push

      - name: Check whether to send email
        id: email_gate
        run: |
          python - <<'EOF' >> "$GITHUB_OUTPUT"
          import json
          with open("jobs.json") as f:
              data = json.load(f)
          new_count = int(data.get("new_count", 0))
          print(f"should_email={'true' if new_count > 0 else 'false'}")
          EOF

      - name: Send email with results
        if: steps.email_gate.outputs.should_email == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python - <<'EOF'
          import os, smtplib, json
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          user = os.environ["GMAIL_USER"]
          password = os.environ["GMAIL_APP_PASSWORD"]

          with open("jobs.json") as f:
              data = json.load(f)
          with open("jobs.md") as f:
              body_md = f.read()
          with open("jobs.html") as f:
              body_html = f.read()

          new_count = data["new_count"]
          scraped_at = data["scraped_at"]
          subject = f"🧬 Biotech LinkedIn — {new_count} new role(s) [{scraped_at[:10]}]"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"] = user
          msg["To"] = user
          msg.attach(MIMEText(body_md, "plain", "utf-8"))
          msg.attach(MIMEText(body_html, "html", "utf-8"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(user, password)
              smtp.sendmail(user, user, msg.as_string())

          print(f"✅ Email sent to {user}")
          EOF
